name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip git zip unzip libffi-dev libssl-dev libgles2-mesa-dev build-essential libgl1 libglx-mesa0

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.37

    - name: Pre-install Android SDK and NDK
      run: |
        SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_ROOT/cmdline-tools
        
        # Install new cmdline-tools (requires Java 17)
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/ct.zip
        unzip -q /tmp/ct.zip -d /tmp/ct_dir
        mv /tmp/ct_dir/cmdline-tools $SDK_ROOT/cmdline-tools/latest
        rm -rf /tmp/ct.zip /tmp/ct_dir
        
        NEW_SDK=$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
        
        # Accept licenses and install components
        yes | $NEW_SDK --sdk_root=$SDK_ROOT --licenses > /dev/null 2>&1 || true
        $NEW_SDK --sdk_root=$SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;33.0.2"
        
        # Install NDK r25b
        wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O /tmp/ndk.zip
        unzip -q /tmp/ndk.zip -d $HOME/.buildozer/android/platform/
        rm -f /tmp/ndk.zip
        
        # Create wrapper script for old-style sdkmanager path (avoid heredoc in YAML)
        mkdir -p $SDK_ROOT/tools/bin
        printf '%s\n' '#!/bin/bash' 'exec "$(dirname "$0")/../../cmdline-tools/latest/bin/sdkmanager" "$@"' > $SDK_ROOT/tools/bin/sdkmanager
        chmod +x $SDK_ROOT/tools/bin/sdkmanager
        
        # Verify
        echo "SDK contents:" && ls $SDK_ROOT/
        echo "build-tools:" && ls $SDK_ROOT/build-tools/ 2>/dev/null || echo "none"
        echo "NDK:" && ls $HOME/.buildozer/android/platform/ | grep ndk || echo "none"

    - name: Build Android APK
      run: |
        cd android_app
        buildozer android debug 2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: autotrade-mobile-apk
        path: android_app/bin/*.apk
        if-no-files-found: warn
