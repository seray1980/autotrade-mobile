name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android Build Tools
      run: |
        sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip git zip unzip \
          libffi-dev libssl-dev \
          libgles2-mesa-dev \
          build-essential \
          libgl1 libglx-mesa0

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.37

    - name: Configure buildozer to use installed SDK/NDK
      run: |
        mkdir -p ~/.buildozer/android/platform
        # 把 GitHub Actions 安装好的 SDK 软链接到 buildozer 期望的路径
        SDK_PATH=$(echo $ANDROID_SDK_ROOT)
        echo "ANDROID_SDK_ROOT: $SDK_PATH"
        ln -sfn $SDK_PATH ~/.buildozer/android/platform/android-sdk

    - name: Build Android APK
      run: |
        cd android_app
        buildozer android debug 2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: autotrade-mobile-apk
        path: android_app/bin/*.apk
        if-no-files-found: warn
