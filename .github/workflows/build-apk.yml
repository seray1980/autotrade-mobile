name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
        python3-pip git zip unzip wget \
        libffi-dev libssl-dev libgl1-mesa-glx \
        libgles2-mesa-dev libsdl2-dev \
        build-essential cython3

    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython

    - name: Build Android APK
      run: |
        cd android_app
        buildozer android debug deploy

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: autotrade-mobile-apk
        path: android_app/bin/*.apk
