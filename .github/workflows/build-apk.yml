name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
        python3-pip git zip unzip wget \
        libffi-dev libssl-dev libgl1 \
        libgles2-mesa-dev libsdl2-dev \
        build-essential cython3

    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython
    - name: Accept Android SDK licenses
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" > ~/.buildozer/android/platform/android-sdk/licenses/google-gdk
        echo "33b6a2b64607e68f88f8224d649a6314117382f5" > ~/.buildozer/android/platform/android-sdk/licenses/mips-android-sysimage-license

    - name: Build Android APK
      run: |
        cd android_app
        buildozer android debug deploy

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: autotrade-mobile-apk
        path: android_app/bin/*.apk
