name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip git zip unzip wget \
          libffi-dev libssl-dev \
          libgles2-mesa-dev \
          build-essential \
          libgl1 libglx-mesa0 \
          openjdk-17-jdk

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.37

    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/.buildozer/android/platform
        cd $HOME/.buildozer/android/platform
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mkdir -p android-sdk/cmdline-tools/latest
        mv cmdline-tools/* android-sdk/cmdline-tools/latest/ 2>/dev/null || true
        rm -f cmdline-tools.zip
        export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
        # Accept licenses
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        # Install required SDK packages
        sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools" > /dev/null 2>&1

    - name: Build Android APK
      env:
        ANDROID_SDK_ROOT: /root/.buildozer/android/platform/android-sdk
      run: |
        cd android_app
        buildozer android debug 2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: autotrade-mobile-apk
        path: android_app/bin/*.apk
        if-no-files-found: warn
